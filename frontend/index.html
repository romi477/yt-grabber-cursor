<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yt-grabber-cursor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>yt-grabber-cursor</h1>
        <p class="tagline">Download YouTube video or audio</p>
      </header>

      <main class="panels">
        <section class="panel" id="download-section" aria-labelledby="download-heading">
          <h2 id="download-heading">Download</h2>

          <div class="url-row">
            <input
              type="url"
              id="url-input"
              placeholder="https://www.youtube.com/watch?v=..."
              autocomplete="off"
            />
            <button type="button" id="info-btn" class="btn btn-primary">Get Info</button>
          </div>

          <div id="preview" class="preview" hidden>
            <img id="thumbnail" alt="" width="320" height="180" />
            <div class="preview-meta">
              <h3 id="video-title"></h3>
              <p id="video-meta" class="muted"></p>
            </div>
          </div>

          <fieldset class="type-toggle" id="type-toggle" hidden>
            <legend>Format</legend>
            <label class="radio-label">
              <input type="radio" name="media-type" value="video" checked />
              Video
            </label>
            <label class="radio-label">
              <input type="radio" name="media-type" value="audio" />
              Audio
            </label>
          </fieldset>

          <div class="quality-row" id="quality-row" hidden>
            <label for="quality-select">Quality</label>
            <select id="quality-select"></select>
          </div>

          <button type="button" id="download-btn" class="btn btn-accent" disabled>
            Download
          </button>

          <div id="progress-block" class="progress-block" hidden>
            <progress id="progress-bar" max="100" value="0"></progress>
            <span id="progress-label" class="muted">0%</span>
          </div>

          <div id="result-block" class="result-block" hidden>
            <a id="save-link" class="btn btn-primary" href="#" download>Save to disk</a>
          </div>

          <p id="download-error" class="error" hidden role="alert"></p>
        </section>

        <section class="panel" id="transcribe-section" aria-labelledby="transcribe-heading">
          <h2 id="transcribe-heading">Transcribe</h2>
          <p class="muted">Speech-to-text with Whisper on a downloaded file.</p>

          <div class="field-row">
            <label for="file-select">File</label>
            <select id="file-select" aria-label="Downloaded file">
              <option value="">Loading files…</option>
            </select>
          </div>

          <div class="field-row">
            <label for="model-select">Model</label>
            <select id="model-select" aria-label="Whisper model">
              <option value="tiny">tiny — fastest</option>
              <option value="base" selected>base — balanced</option>
              <option value="small">small</option>
              <option value="medium">medium — most accurate</option>
            </select>
          </div>

          <button type="button" id="transcribe-btn" class="btn btn-accent" disabled>
            Transcribe
          </button>

          <div id="transcribe-progress" class="transcribe-progress" hidden>
            <span class="spinner" aria-hidden="true"></span>
            <span id="transcribe-status" class="muted">Transcribing…</span>
          </div>

          <textarea
            id="transcript-output"
            class="transcript-output"
            rows="10"
            readonly
            hidden
            placeholder="Transcript will appear here…"
          ></textarea>

          <div id="export-block" class="export-block" hidden>
            <span class="export-label muted">Export</span>
            <div class="export-buttons">
              <button type="button" id="export-txt" class="btn btn-primary">TXT</button>
              <button type="button" id="export-pdf" class="btn btn-primary">PDF</button>
              <button type="button" id="export-json" class="btn btn-primary">JSON</button>
            </div>
          </div>

          <p id="transcribe-error" class="error" hidden role="alert"></p>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>

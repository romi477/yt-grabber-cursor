name: yt-grabber-cursor

services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      WHISPER_CACHE_DIR: /app/whisper-cache
    volumes:
      - ./backend/data:/app/data
      - ./backend/transcripts:/app/transcripts
      - ./backend/whisper-cache:/app/whisper-cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/docs')\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
